name: Checks

on:
  pull_request:
  push:
    branches: [master]

# Reusable workflows can only restrict permissions, never elevate; the reusable
# workflow declares statuses: write (coverage-monitor) on every run, so a caller
# permissions block MUST include it or GitHub fails with startup_failure.
permissions:
  contents: read
  pull-requests: write
  statuses: write

jobs:
  checks:
    uses: kaisekidev/.github/.github/workflows/checks.yml@v1
    with:
      coverage-threshold: 30   # only ConfigProvider is tested today; ratchet up as Favicon/FaviconFactory gain coverage
